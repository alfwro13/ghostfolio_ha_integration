        var growth = parseFloat(fundObj.attributes.projected_1y_growth);
        if (isNaN(growth)) return '-';
        
        var color = growth > 0 ? '#4caf50' : (growth < 0 ? '#f44336' : 'inherit');
        var sign = growth > 0 ? '+' : '';
        return '<span style="color:' + color + '; font-weight:bold;">' + sign + (growth * 100).toFixed(2) + '%</span>';
