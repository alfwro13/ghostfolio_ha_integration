type: custom:flex-table-card
title: Watchlist Limits
clickable: true
enable_search: true
entities:
  include: sensor.watchlist_*
  exclude:
    - number.watchlist_*
    - select.watchlist_ticker_selector
    - sensor.watchlist_selected_asset_type
    - sensor.watchlist_selected_fundamental_data
sort_by: ticker+
columns:
  - name: Holding
    data: friendly_name
    modify: "x ? String(x).replace('Watchlist ', '').trim() : '-'"
  - name: Ticker
    data: ticker
    align: left
    modify: |-
      (() => {
        if (!x) return '-';
        var t = String(x).trim();
        
        // 1. Stop the standard row more-info dialog from opening
        var js = "event.stopPropagation(); ";
        
        // 2. Connect to Home Assistant's backend
        js += "var ha = document.querySelector('home-assistant'); ";
        js += "if(ha && ha.hass) { ";
        
        // 3. Update the input_text with the clicked ticker
        js += "ha.hass.callService('input_text', 'set_value', { entity_id: 'input_text.watchlist_selected_ticker', value: '" + t + "' }); ";
        
        // 4. Force the browser to navigate to your subview
        js += "history.pushState(null, '', '/dashboard-money/watchlist-details'); ";
        js += "window.dispatchEvent(new CustomEvent('location-changed')); ";
        js += "}";
        
        // Wrap the ticker in a clickable div styled to look like a link
        return '<div style="cursor: pointer; color: var(--primary-color); border-bottom: 1px dashed var(--primary-color);" onclick="' + js + '"><b>' + t + '</b></div>';
      })()
  - name: Valuation
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || !fundObj.attributes.valuation) return '-';
        
        var val = String(fundObj.attributes.valuation);
        if (val.toLowerCase() === 'unknown' || val.trim() === '') return '-';
        
        var color = 'inherit';
        if (val.includes('under')) color = '#4caf50';
        else if (val.includes('over')) color = '#f44336';
        else if (val.includes('fairly')) color = '#ff9800';
        
        var formattedVal = val.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        return '<span style="color:' + color + '; font-weight:bold;">' + formattedVal + '</span>';
      })()
  - name: 5y PEG
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || fundObj.attributes.pegRatio == null) return '-';
        
        var peg = parseFloat(fundObj.attributes.pegRatio);
        if (isNaN(peg)) return '-';
        
        var status = '';
        var color = 'inherit';
        
        if (peg < 1.0) {
          status = 'Undervalued';
          color = '#4caf50';
        } else if (peg <= 1.5) {
          status = 'Fairly Valued';
          color = '#ff9800';
        } else {
          status = 'Overvalued';
          color = '#f44336';
        }
        
        return '<span style="color:' + color + '; font-weight:bold;">' + status + ' (' + peg.toFixed(2) + ')</span>';
      })()
  - name: Fwd P/E
    data: entity_id
    align: right
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || fundObj.attributes.forward_pe == null) return '-';
        
        var pe = parseFloat(fundObj.attributes.forward_pe);
        return isNaN(pe) ? '-' : pe.toFixed(1);
      })()
  - name: Rec
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || !fundObj.attributes.recommendationKey) return '-';
        
        var rec = String(fundObj.attributes.recommendationKey).toLowerCase();
        var color = 'inherit';
        if (rec.includes('buy')) color = '#4caf50';
        else if (rec.includes('sell')) color = '#f44336';
        else if (rec.includes('hold')) color = '#ff9800';
        
        return '<span style="color:' + color + '; font-weight:bold;">' + rec.toUpperCase().replace(/_/g, ' ') + '</span>';
      })()
  - name: Beta
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || fundObj.attributes.beta == null) return '-';
        
        var rawBeta = parseFloat(fundObj.attributes.beta);
        if (isNaN(rawBeta)) return '-';
        
        var b = Math.round(rawBeta * 100) / 100;
        var status = '';
        var color = 'inherit';
        
        if (b > 1) {
          status = 'Volatile';
          color = '#ff9800';
        } else if (b < 1 && b > 0) {
          status = 'Stable';
          color = '#4caf50';
        } else if (b < 0) {
          status = 'Inverse';
          color = '#2196f3';
        } else if (b === 0) {
          status = 'Uncorrelated';
        } else if (b === 1) {
          status = 'Average';
        }
        
        return '<span style="color:' + color + '; font-weight:bold;">' + status + ' (' + rawBeta.toFixed(2) + ')</span>';
      })()
  - name: Div %
    data: entity_id
    align: right
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
