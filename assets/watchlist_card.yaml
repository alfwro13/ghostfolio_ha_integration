  - name: Value
    data: state
    align: right
    modify: |-
      (() => {
        if (!x) return '';
        var s = String(x).toLowerCase().trim();
        if (s === 'unknown' || s === 'unavailable' || s === 'undefined' || s === '') return '';
        var val = parseFloat(x);
        return isNaN(val) ? x : val.toFixed(2);
      })()
  - name: Target
    data: entity_id
    align: right
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || fundObj.attributes.targetMedianPrice == null) return '-';
        
        var target = parseFloat(fundObj.attributes.targetMedianPrice);
        return isNaN(target) ? '-' : Math.trunc(target);
      })()
  - name: Low Limit
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var limitObj = haNode.hass.states['number.watchlist_' + ticker + '_low_limit'];
        if (!limitObj || limitObj.state === 'unknown' || limitObj.state === 'unavailable') return '-';
        
        var limitVal = parseFloat(limitObj.state);
        if (isNaN(limitVal) || limitVal === 0) return '-';
        
        var price = parseFloat(stateObj.state);
        if (!isNaN(price) && price <= (limitVal * 1.02)) {
          return '<div style="background-color: rgba(76, 175, 80, 0.2); color: #4caf50; font-weight: bold; border-radius: 4px; padding: 4px; box-sizing: border-box;">' + limitVal + '</div>';
        }
        return String(limitVal);
      })()
  - name: Short list
    data: entity_id
    align: center
    modify: |-
      (() => {
        if (!x) return '-';
        var haNode = document.querySelector('home-assistant');
        if (!haNode || !haNode.hass) return '-';
        var stateObj = haNode.hass.states[x];
        if (!stateObj || !stateObj.attributes || !stateObj.attributes.ticker) return '-';
        
        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        
        if (!fundObj || !fundObj.attributes) return '-';
        
        var price = parseFloat(stateObj.state);
        var target = parseFloat(fundObj.attributes.targetMedianPrice);
        var growth = parseFloat(fundObj.attributes.projected_1y_growth);
        var peg = parseFloat(fundObj.attributes.pegRatio);
        var rec = String(fundObj.attributes.recommendationKey).toLowerCase();
        
        if (isNaN(price) || isNaN(target) || isNaN(growth)) return '-';
        peg = isNaN(peg) ? 99 : peg; // Fail strict checks if PEG is missing
        
        var isBuy = rec.includes('buy');
        var isHold = rec.includes('hold');
        var isUndervalued = String(fundObj.attributes.valuation).includes('under');
        var isFairlyValued = String(fundObj.attributes.valuation).includes('fair');
        
        // YES Criteria: Buy rating, undervalued OR good PEG, >10% growth, price below target
        if (isBuy && (peg <= 1.5 || isUndervalued) && growth >= 0.10 && price < target) {
          return '<span style="color:#4caf50; font-weight:bold;">Yes</span>';
        }
        
        // MAYBE Criteria: Buy/Hold rating, fair PEG, >5% growth, price within 5% of target
        if ((isBuy || isHold) && (peg <= 2.0 || isFairlyValued) && growth >= 0.05 && price <= (target * 1.05)) {
          return '<span style="color:#ff9800; font-weight:bold;">Maybe</span>';
        }
        
        return '-';
      })()
