        var ticker = String(stateObj.attributes.ticker).toLowerCase().replace(/\./g, '_').replace(/\s/g, '_');
        var fundObj = haNode.hass.states['sensor.fundamentals_' + ticker + '_fundamentals'];
        if (!fundObj || !fundObj.attributes || fundObj.attributes.dividend_yield == null) return '-';
        
        var div = parseFloat(fundObj.attributes.dividend_yield);
        if (isNaN(div) || div === 0) return '-';
        return (div * 100).toFixed(2) + '%';
      })()
  - name: 24h %
    data: market_change_pct_24h
    align: right
    modify: |-
      (() => {
        var val = parseFloat(x);
        if (isNaN(val)) return '-';
        var color = val > 0 ? '#4caf50' : val < 0 ? '#f44336' : 'inherit';
        var sign = val > 0 ? '+' : '';
        return '<span style="color:' + color + '; font-weight:bold;">' + sign + val.toFixed(2) + '%</span>';
      })()
  - name: 50d
    data: trend_50d
    align: center
    modify: |-
      (() => {
        if (!x) return '';
        var t = String(x).toUpperCase().trim();
        if (t === 'UNKNOWN' || t === 'UNAVAILABLE' || t === 'UNDEFINED' || t === '') return '';
        var color = t === 'UP' ? '#4caf50' : (t === 'DOWN' ? '#f44336' : 'inherit');
        return '<span style="color:' + color + '; font-weight:bold;">' + t + '</span>';
      })()
